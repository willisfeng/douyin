<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 转录文案 - 直播监控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--surface3:#242440;--border:#2a2a45;--text:#e0e0f0;--text-dim:#8888aa;--accent:#ff4d6a;--accent2:#ffb347;--accent3:#6c5ce7;--green:#00e676;--radius:10px;--radius-sm:8px}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Password Gate ── */
.pw-gate{display:flex;position:fixed;inset:0;background:var(--bg);z-index:9999;justify-content:center;align-items:center;flex-direction:column;gap:20px}
.pw-gate.hidden{display:none}
.pw-gate .pw-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:90%;max-width:400px;text-align:center}
.pw-gate h2{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.pw-gate p{color:var(--text-dim);font-size:13px;margin-bottom:20px}
.pw-gate input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;text-align:center;font-family:inherit;letter-spacing:4px}
.pw-gate input:focus{border-color:var(--accent3)}
.pw-gate button{width:100%;padding:12px;border-radius:8px;background:var(--accent3);border:none;color:#fff;font-size:15px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:12px}
.pw-gate button:hover{opacity:.9}
.pw-gate .pw-error{color:var(--accent);font-size:13px;margin-top:8px;display:none}

.header{background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0a1a2e);border-bottom:1px solid var(--border);padding:32px 24px;position:relative}
.header::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(108,92,231,.06) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(255,77,106,.04) 0%,transparent 50%);pointer-events:none}
.header-content{max-width:1000px;margin:0 auto;position:relative;z-index:1}
.header h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:14px;color:var(--text-dim);margin-top:4px}
.header .back{margin-top:12px;display:inline-block;color:var(--accent3);text-decoration:none;font-size:14px}
.header .back:hover{text-decoration:underline}
.container{max-width:1000px;margin:0 auto;padding:20px 24px}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;font-size:13px;color:var(--text-dim)}
.stats .num{color:var(--text);font-weight:700;font-size:15px}
.search-bar{position:relative;margin-bottom:20px}
.search-bar input{width:100%;padding:12px 16px 12px 40px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent3)}.search-bar input::placeholder{color:var(--text-dim)}
.search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px}
.loading{text-align:center;padding:60px;color:var(--text-dim)}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent3);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--text-dim);font-size:15px}
.empty .big{font-size:48px;margin-bottom:12px;opacity:.4}
.error{text-align:center;padding:40px;color:var(--accent);font-size:14px}
.anchor-group{margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.anchor-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:all .2s}
.anchor-header:hover{background:var(--surface2)}
.anchor-header .arrow{font-size:10px;color:var(--text-dim);transition:transform .25s;flex-shrink:0}
.anchor-header .arrow.open{transform:rotate(90deg)}
.anchor-header .name{font-size:17px;font-weight:700;color:var(--accent2);flex:1}
.anchor-header .count{font-size:12px;color:var(--text-dim);background:var(--surface3);padding:3px 10px;border-radius:20px}
.anchor-body{padding:12px 18px 18px;display:none}
.anchor-body.open{display:block}
.t-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.t-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none}
.t-header:hover{background:var(--surface3)}
.t-header .arrow{font-size:9px;color:var(--text-dim);transition:transform .25s;flex-shrink:0}
.t-header .arrow.open{transform:rotate(90deg)}
.t-header .time{font-size:13px;color:var(--text);flex:1}
.t-header .dl{padding:4px 12px;border-radius:5px;background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s}
.t-header .dl:hover{background:var(--accent3);border-color:var(--accent3);color:#fff}
.t-body{display:none;padding:0 14px 14px}
.t-body.open{display:block}
.t-body .txt{background:var(--surface);border-radius:6px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;max-height:400px;overflow-y:auto;color:#d0d0e0}
.t-body .txt .loading-msg{color:var(--text-dim);text-align:center;padding:20px}
</style>
</head>
<body>

<!-- ── Password Gate ── -->
<div class="pw-gate" id="pwGate">
  <div class="pw-card">
    <h2>🔒 请输入访问密码</h2>
    <p>此页面内容受密码保护</p>
    <input type="password" id="pwInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">验证</button>
    <div class="pw-error" id="pwError">密码错误，请重试</div>
  </div>
</div>

<div class="header">
<div class="header-content">
<h1>📝 转录文案</h1>
<div class="sub">直播语音转文字内容 · 按主播分类</div>
<a class="back" href="index.html">← 返回监控首页</a>
</div>
</div>

<div class="container">
<div class="stats" id="statsBar"></div>
<div class="search-bar">
<span class="icon">🔍</span>
<input type="text" id="search" placeholder="搜索主播名称或文案内容..." oninput="filter()">
</div>

<div id="loading" class="loading"><div class="spinner"></div><div>正在加载转录数据...</div></div>
<div id="empty" class="empty" style="display:none"><div class="big">📭</div><div>暂无转录内容</div></div>
<div id="error" class="error" style="display:none"></div>
<div id="anchorList"></div>
</div>

<script>
/* ── Pure JS SHA-1 (works everywhere, no crypto.subtle needed) ── */
function sha1(str){
  function R(n,b){return(n<<b)|(n>>>(32-b))}
  var i,j,t,l=str.length*8,a=((l+64>>9)<<4)+15,o=Array(a),w=Array(80);
  for(i=0;i<l;i+=8) o[i>>5]|=(str.charCodeAt(i/8)&255)<<(24-i%32);
  o[i>>5]|=128<<(24-i%32); o[a-1]=l;
  var h0=1732584193,h1=4023233417,h2=2562383102,h3=271733878,h4=3285377520;
  for(i=0;i<a;i+=16){
    for(j=0;j<16;j++) w[j]=o[i+j];
    for(j=16;j<80;j++) w[j]=R(w[j-3]^w[j-8]^w[j-14]^w[j-16],1);
    var a0=h0,b=h1,c=h2,d=h3,e=h4;
    for(j=0;j<80;j++){
      if(j<20){t=(R(a0,5)+(b&c|~b&d)+e+w[j]+1518500249)|0}
      else if(j<40){t=(R(a0,5)+(b^c^d)+e+w[j]+1859775393)|0}
      else if(j<60){t=(R(a0,5)+(b&c|b&d|c&d)+e+w[j]+2400959708)|0}
      else{t=(R(a0,5)+(b^c^d)+e+w[j]+3395469782)|0}
      e=d;d=c;c=R(b,30);b=a0;a0=t;
    }
    h0=(h0+a0)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;
  }
  function X(n){return((n>>>0).toString(16)).slice(-8)}
  return X(h0)+X(h1)+X(h2)+X(h3)+X(h4);
}

/* ── Password Protection ── */
var PW_HASH = 'd723ac5d1829ce02bd59666c3b00d41a50274e13';

function checkPw(){
  var p = document.getElementById('pwInput').value.trim();
  if(!p) return;
  var hx = sha1(p);
  if(hx === PW_HASH){
    document.getElementById('pwGate').classList.add('hidden');
    sessionStorage.setItem('_pw_ok', '1');
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
if(sessionStorage.getItem('_pw_ok') === '1'){
  document.getElementById('pwGate').classList.add('hidden');
}

var PROXY_BASE = 'https://gh.llkk.cc/';
function proxyUrl(u){
  if(!u) return u;
  if(u.indexOf('github.com/') >= 0 && (u.indexOf('/releases/download/') >= 0 || u.indexOf('/releases/assets/') >= 0)){
    return PROXY_BASE + u;
  }
  if(u.indexOf('raw.githubusercontent.com/') >= 0){
    return PROXY_BASE + u;
  }
  return u;
}

let data = null;
let loadedContent = {};

async function init(){
try{
const r=await fetch('https://raw.githubusercontent.com/willisfeng/douyin/main/docs/transcripts_index.json');
if(!r.ok)throw new Error('HTTP '+r.status);
data=await r.json();
document.getElementById('loading').style.display='none';
if(!data.anchors||data.anchors.length===0){
document.getElementById('empty').style.display='';return;
}
document.getElementById('statsBar').innerHTML=
'<span>主播: <span class="num">'+data.room_count+'</span></span>'+
'<span>转录文件: <span class="num">'+data.transcript_count+'</span></span>';
render();
}catch(e){
document.getElementById('loading').style.display='none';
const err=document.getElementById('error');
err.textContent='加载失败: '+e.message;
err.style.display='';
}}

function render(){
let html='';
for(const a of data.anchors){
const items=a.transcripts;
/* Group by date */
var groups={};
items.forEach(function(it){
  var d=it.start.slice(0,8); /* YYYYMMDD */
  if(!groups[d]) groups[d]={date:d, items:[]};
  groups[d].items.push(it);
});
var groupList=Object.values(groups).sort(function(a,b){return b.date.localeCompare(a.date)});

html+='<div class="anchor-group">'+
'<div class="anchor-header" onclick="toggleAnchor(this)">'+
'<span class="arrow">▶</span>'+
'<span class="name">'+esc(a.name)+'</span>'+
'<span class="count">'+groupList.length+' 天 · '+items.length+' 条</span>'+
'</div>'+
'<div class="anchor-body">';

for(const g of groupList){
var gItems=g.items.sort(function(a,b){return a.start.localeCompare(b.start)});
var dateLabel=g.date.slice(0,4)+'-'+g.date.slice(4,6)+'-'+g.date.slice(6,8);
html+='<div style="font-size:14px;font-weight:700;color:var(--accent2);margin:12px 0 8px;padding:6px 12px;background:var(--surface3);border-radius:8px;display:inline-block">📅 '+dateLabel+'</div>';
for(const it of gItems){
const start=fmtTS(it.start);
html+='<div class="t-item">'+
'<div class="t-header" onclick="toggleT(this)">'+
'<span class="arrow">▶</span>'+
'<span class="time">'+start+'</span>'+
'<a class="dl" href="'+proxyUrl(it.url)+'" target="_blank" onclick="event.stopPropagation()">下载</a>'+
'</div>'+
'<div class="t-body"><div class="txt" data-url="'+it.url+'"><div class="loading-msg">点击展开文案...</div></div></div>'+
'</div>';
}
}
html+='</div></div>';
}
document.getElementById('anchorList').innerHTML=html;
}

function toggleAnchor(el){
el.querySelector('.arrow').classList.toggle('open');
el.nextElementSibling.classList.toggle('open');
}

function toggleT(el){
const arrow=el.querySelector('.arrow');
arrow.classList.toggle('open');
const body=el.nextElementSibling;
body.classList.toggle('open');
if(body.classList.contains('open')){
const txt=body.querySelector('.txt');
if(txt&&!txt.dataset.loaded){
txt.dataset.loaded='1';
txt.innerHTML='<div class="loading-msg">加载中...</div>';
var u=txt.dataset.url;
fetch(proxyUrl(u)).then(function(r){if(!r.ok)throw new Error(r.status);return r.text()}).then(function(t){
  try{var j=JSON.parse(t);txt.textContent=j||''}catch(e){txt.textContent=t}
}).catch(function(){
  txt.innerHTML='<div class="loading-msg"><a href="'+u+'" target="_blank" style="color:#6c5ce7">点击下载查看原文</a></div>'
});;
}
}}

function filter(){
const q=document.getElementById('search').value.toLowerCase();
document.querySelectorAll('.anchor-group').forEach(g=>{
const name=g.querySelector('.name').textContent.toLowerCase();
let show=!q||name.includes(q);
if(!show&&q){
const items=g.querySelectorAll('.txt');
for(let it of items){
if(it.textContent.toLowerCase().includes(q)){show=true;break;}
}
}
g.style.display=show?'':'';
});
}

function fmtTS(ts){
if(!ts||ts.length<15)return ts||'';
return ts.slice(0,4)+'-'+ts.slice(4,6)+'-'+ts.slice(6,8)+' '+ts.slice(9,14);
}

function esc(s){
const d=document.createElement('div');
d.textContent=s;
return d.innerHTML;
}

init();
</script>
</body>
</html>
