name: Test alignment
on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: deps-playwright-${{ runner.os }}
          restore-keys: deps-playwright-
      - name: Install deps
        run: |
          pip install --timeout 120 playwright
          python -m playwright install chromium
      - name: Run full test
        env:
          TEST_ROOM: '168465302284'
          TEST_DURATION: '120'
        run: python test_alignment.py
      - name: Upload recordings
        uses: actions/upload-artifact@v4
        with:
          name: full-test-recordings
          path: /tmp/recordings/
          retention-days: 3
