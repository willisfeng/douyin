name: Build transcripts index
on:
  release:
    types: [published, edited]
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build index
        run: python3 build_transcripts_index.py docs/transcripts_index.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Commit and push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/transcripts_index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update transcripts index"
          git push
